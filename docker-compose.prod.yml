services:
  app:
    image: "${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}:${IMAGE_TAG:-latest}"
    pull_policy: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      TRUST_PROXY: "1"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
