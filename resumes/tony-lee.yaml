projects:
  title: "ML Infrastructure Projects"
  items:
    - title: "Elastic GPU Inference Platform (EKS + Karpenter + vLLM)"
      highlights:
        - "Built an elastic GPU inference platform on AWS with Terraform-managed VPC/EKS, Karpenter, vLLM, and an ALB-backed OpenAI-compatible /v1 endpoint."
        - "Designed mixed spot/on-demand GPU capacity with Karpenter NodePools and a warm baseline, eliminating fixed GPU node groups while preserving burst scale-out."
        - "Implemented custom-metric autoscaling with Prometheus Adapter and vllm_requests_running, allowing HPA scale-out to trigger vLLM replicas and GPU nodes."
        - "Built verify/evaluate workflows that prove scale-from-zero and return-to-zero cleanup, compare zero-idle vs warm-1 profiles, and report latency, TTFT, GPU utilization, NodeClaims, and cost."
        - "Instrumented Prometheus, Grafana, DCGM exporter, and Pushgateway reporting to make queue pressure, autoscaling behavior, and GPU utilization visible during burst tests."

