  <rect class="exa" x="445" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="454" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="463" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="472" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exa" x="481" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="490" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="499" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="508" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exa" x="517" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="526" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="535" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="544" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exa" x="553" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="562" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="571" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="580" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="589" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exa" x="598" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="607" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="616" y="256" width="7" height="14" rx="1.5"/>

  <!-- shared expert, always on -->
  <rect class="shr" x="272" y="222" width="58" height="54" rx="2"/>
  <text class="shrtx" x="301" y="241" text-anchor="middle">shared</text>
  <text class="shrtx" x="301" y="254" text-anchor="middle">expert</text>
  <text class="shrst" x="301" y="268" text-anchor="middle">always on</text>

  <!-- step 3: the 8 picked experts run; outputs fan into the weighted sum -->
  <line class="fan" x1="358.5" y1="270" x2="480" y2="312"/>
  <line class="fan" x1="385.5" y1="270" x2="480" y2="312"/>
  <line class="fan" x1="421.5" y1="270" x2="480" y2="312"/>
  <line class="fan" x1="448.5" y1="270" x2="480" y2="312"/>
  <line class="fan" x1="484.5" y1="270" x2="480" y2="312"/>
  <line class="fan" x1="520.5" y1="270" x2="480" y2="312"/>
  <line class="fan" x1="556.5" y1="270" x2="480" y2="312"/>
  <line class="fan" x1="601.5" y1="270" x2="480" y2="312"/>
  <path class="garr" d="M301,276 L301,314 L466,314" marker-end="url(#ag)"/>

  <circle class="mrg" cx="480" cy="314" r="9"/>
  <text class="mrgtx" x="480" y="318" text-anchor="middle">+</text>

  <circle class="stC" cx="504" cy="317" r="7"/>
  <text class="stN" x="504" y="320.5" text-anchor="middle">3</text>
  <text class="stT" x="516" y="313">run + sum outputs,</text>
