  <rect class="bri" x="391" y="248" width="7" height="6"/>
  <rect class="bri" x="400" y="250" width="7" height="4"/>
  <rect class="bri" x="409" y="246" width="7" height="8"/>
  <rect class="bra" x="418" y="230" width="7" height="24"/>
  <rect class="bri" x="427" y="249" width="7" height="5"/>
  <rect class="bri" x="436" y="247" width="7" height="7"/>
  <rect class="bra" x="445" y="236" width="7" height="18"/>
  <rect class="bri" x="454" y="250" width="7" height="4"/>
  <rect class="bri" x="463" y="248" width="7" height="6"/>
  <rect class="bri" x="472" y="245" width="7" height="9"/>
  <rect class="bra" x="481" y="233" width="7" height="21"/>
  <rect class="bri" x="490" y="251" width="7" height="3"/>
  <rect class="bri" x="499" y="249" width="7" height="5"/>
  <rect class="bri" x="508" y="246" width="7" height="8"/>
  <rect class="bra" x="517" y="231" width="7" height="23"/>
  <rect class="bri" x="526" y="248" width="7" height="6"/>
  <rect class="bri" x="535" y="250" width="7" height="4"/>
  <rect class="bri" x="544" y="247" width="7" height="7"/>
  <rect class="bra" x="553" y="237" width="7" height="17"/>
  <rect class="bri" x="562" y="249" width="7" height="5"/>
  <rect class="bri" x="571" y="246" width="7" height="8"/>
  <rect class="bri" x="580" y="251" width="7" height="3"/>
  <rect class="bri" x="589" y="248" width="7" height="6"/>
  <rect class="bra" x="598" y="234" width="7" height="20"/>
  <rect class="bri" x="607" y="250" width="7" height="4"/>
  <rect class="bri" x="616" y="247" width="7" height="7"/>

  <!-- expert strip (256 experts, compact; top-8 green, rest inert) -->
  <rect class="exi" x="337" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="346" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exa" x="355" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="364" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="373" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exa" x="382" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="391" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="400" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exi" x="409" y="256" width="7" height="14" rx="1.5"/>
  <rect class="exa" x="418" y="256" width="7" height="14" rx="1.5"/>
