  <path class="garr" d="M480,323 L480,356" marker-end="url(#ag)"/>
  <text class="op" x="480" y="370" text-anchor="middle">residual stream</text>

  <text class="trafB" x="480" y="394" text-anchor="middle">671B total · 37B active per token</text>

  <text class="note" x="340" y="424" text-anchor="middle">MoE replicates the FFN, not attention — position-wise means per-token routing just works</text>

</svg>
