<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 472" role="img"
     aria-label="The attention score grid for the sentence The cat sat because it was tired. Rows are the querying token, columns are the token being looked at. Each cell is a query-key dot product. The upper triangle, where a token would look ahead to a later token, is masked out. Each row is normalized by softmax into attention weights. The cell in the row for it and the column for cat is highlighted, showing attention resolving the pronoun to its referent.">
  <style>
    .bg     { fill:#ffffff; stroke:#e6e6e6; }
    .ey     { font:600 12px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:1.5px; fill:#006b40; }
    .formula{ font:600 14px 'JetBrains Mono',ui-monospace,monospace; fill:#14171a; }
    .fop    { fill:#006b40; }
    .cell   { fill:#e7efeb; stroke:#cdd8d3; }
    .mask   { fill:#ffffff; stroke:#eef0f0; }
    .hot    { fill:#006b40; stroke:#006b40; }
    .warm   { fill:#bfe7d6; stroke:#9fd8bf; }
    .hdr    { font:600 12px 'JetBrains Mono',ui-monospace,monospace; fill:#7a847f; }
    .hot-lbl{ font:700 12px 'JetBrains Mono',ui-monospace,monospace; fill:#006b40; }
    .lbl    { font:400 12px 'JetBrains Mono',ui-monospace,monospace; fill:#5c6670; }
    .note   { font:600 12px 'JetBrains Mono',ui-monospace,monospace; fill:#006b40; }
    .cap    { font:400 12px 'JetBrains Mono',ui-monospace,monospace; fill:#5c6670; }
    .arr    { stroke:#006b40; stroke-width:1.5; fill:none; }
  </style>
  <defs>
    <marker id="sa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#006b40"/></marker>
  </defs>

  <rect class="bg" x="1" y="1" width="678" height="470" rx="2"/>
  <text class="ey" x="34" y="32">SCALED DOT-PRODUCT ATTENTION</text>

  <!-- formula -->
  <text class="formula" x="340" y="64" text-anchor="middle">output = <tspan class="fop">softmax</tspan>( Q·Kᵀ / √d_head + mask ) · V</text>

  <!-- GRID: 7x7, origin gx=232 gy=120, cell=42. Tokens: The cat sat because it was tired -->
  <!-- row 0: The (c0) -->
  <rect class="cell" x="232" y="120" width="42" height="42"/>
  <rect class="mask" x="274" y="120" width="42" height="42"/><rect class="mask" x="316" y="120" width="42" height="42"/><rect class="mask" x="358" y="120" width="42" height="42"/><rect class="mask" x="400" y="120" width="42" height="42"/><rect class="mask" x="442" y="120" width="42" height="42"/><rect class="mask" x="484" y="120" width="42" height="42"/>
  <!-- row 1: cat -->
  <rect class="cell" x="232" y="162" width="42" height="42"/><rect class="cell" x="274" y="162" width="42" height="42"/>
  <rect class="mask" x="316" y="162" width="42" height="42"/><rect class="mask" x="358" y="162" width="42" height="42"/><rect class="mask" x="400" y="162" width="42" height="42"/><rect class="mask" x="442" y="162" width="42" height="42"/><rect class="mask" x="484" y="162" width="42" height="42"/>
  <!-- row 2: sat -->
  <rect class="cell" x="232" y="204" width="42" height="42"/><rect class="cell" x="274" y="204" width="42" height="42"/><rect class="cell" x="316" y="204" width="42" height="42"/>
  <rect class="mask" x="358" y="204" width="42" height="42"/><rect class="mask" x="400" y="204" width="42" height="42"/><rect class="mask" x="442" y="204" width="42" height="42"/><rect class="mask" x="484" y="204" width="42" height="42"/>
  <!-- row 3: because -->
  <rect class="cell" x="232" y="246" width="42" height="42"/><rect class="cell" x="274" y="246" width="42" height="42"/><rect class="cell" x="316" y="246" width="42" height="42"/><rect class="cell" x="358" y="246" width="42" height="42"/>
  <rect class="mask" x="400" y="246" width="42" height="42"/><rect class="mask" x="442" y="246" width="42" height="42"/><rect class="mask" x="484" y="246" width="42" height="42"/>
  <!-- row 4: it  (highlight col1 = cat) -->
  <rect class="cell" x="232" y="288" width="42" height="42"/><rect class="hot" x="274" y="288" width="42" height="42"/><rect class="cell" x="316" y="288" width="42" height="42"/><rect class="cell" x="358" y="288" width="42" height="42"/><rect class="warm" x="400" y="288" width="42" height="42"/>
  <rect class="mask" x="442" y="288" width="42" height="42"/><rect class="mask" x="484" y="288" width="42" height="42"/>
  <!-- row 5: was -->
  <rect class="cell" x="232" y="330" width="42" height="42"/><rect class="cell" x="274" y="330" width="42" height="42"/><rect class="cell" x="316" y="330" width="42" height="42"/><rect class="cell" x="358" y="330" width="42" height="42"/><rect class="cell" x="400" y="330" width="42" height="42"/><rect class="cell" x="442" y="330" width="42" height="42"/>
  <rect class="mask" x="484" y="330" width="42" height="42"/>
  <!-- row 6: tired -->
  <rect class="cell" x="232" y="372" width="42" height="42"/><rect class="cell" x="274" y="372" width="42" height="42"/><rect class="cell" x="316" y="372" width="42" height="42"/><rect class="cell" x="358" y="372" width="42" height="42"/><rect class="cell" x="400" y="372" width="42" height="42"/><rect class="cell" x="442" y="372" width="42" height="42"/><rect class="cell" x="484" y="372" width="42" height="42"/>

  <!-- column axis cue + headers (key tokens, rotated) -->
  <text class="lbl" x="138" y="108" text-anchor="start">keys →</text>
  <text class="hdr"     x="253" y="112" text-anchor="start" transform="rotate(-40 253 112)">The</text>
  <text class="hot-lbl" x="295" y="112" text-anchor="start" transform="rotate(-40 295 112)">cat</text>
  <text class="hdr"     x="337" y="112" text-anchor="start" transform="rotate(-40 337 112)">sat</text>
  <text class="hdr"     x="379" y="112" text-anchor="start" transform="rotate(-40 379 112)">because</text>
  <text class="hdr"     x="421" y="112" text-anchor="start" transform="rotate(-40 421 112)">it</text>
  <text class="hdr"     x="463" y="112" text-anchor="start" transform="rotate(-40 463 112)">was</text>
  <text class="hdr"     x="505" y="112" text-anchor="start" transform="rotate(-40 505 112)">tired</text>

  <!-- row headers (query tokens) -->
  <text class="lbl"     x="222" y="146" text-anchor="end">The</text>
  <text class="lbl"     x="222" y="188" text-anchor="end">cat</text>
  <text class="lbl"     x="222" y="230" text-anchor="end">sat</text>
  <text class="lbl"     x="222" y="272" text-anchor="end">because</text>
  <text class="hot-lbl" x="222" y="314" text-anchor="end">it</text>
  <text class="lbl"     x="222" y="356" text-anchor="end">was</text>
  <text class="lbl"     x="222" y="398" text-anchor="end">tired</text>

  <!-- query axis label -->
  <text class="lbl" x="150" y="266" text-anchor="middle" transform="rotate(-90 150 266)">queries — the token doing the looking  ↓</text>

  <!-- masked-region note -->
  <text class="lbl" x="540" y="150">masked:</text>
  <text class="lbl" x="540" y="166">a token can't</text>
  <text class="lbl" x="540" y="182">see the future</text>

  <!-- highlight callout -->
  <path class="arr" d="M534,309 L322,309" marker-end="url(#sa)"/>
  <text class="note" x="540" y="305">"it" → "cat"</text>
  <text class="cap"  x="540" y="323">most of the row's</text>
  <text class="cap"  x="540" y="339">weight lands here</text>

  <!-- caption -->
  <text class="cap" x="34" y="442">Rows are queries, columns are keys; each cell scores one against the other.</text>
  <text class="cap" x="34" y="460">The upper triangle is masked; each row softmaxes to weights. "it" → "cat."</text>
</svg>
