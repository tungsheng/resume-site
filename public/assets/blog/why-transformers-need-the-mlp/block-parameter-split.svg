<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" role="img"
     aria-label="One transformer layer of Llama 2 70B, weighed — drawn as the front card of a stack of 80 identical layer cards receding up and to the right, labeled layer 1, layer 2, dots, layer 80. A single bold residual stream enters from the left, runs horizontally through the front layer, and continues out the right side, hopping up through each ghosted card in the stack — the same stream threads all 80 layers. Inside the layer, two sub-blocks are detours off the stream: each branches off with a read arrow and deposits its output back into the stream at a circled plus node. First a small Attention block, tagged GQA, holding Wq at 8192 by 8192, Wk at 8192 by 1024, Wv at 8192 by 1024, and Wo at 8192 by 8192 — 151.0 million parameters, 18 percent of the layer. Then an MLP block drawn several times larger, its area roughly proportional to its weight, tagged SwiGLU, holding W_gate and W_up at 8,192 by 28,672 and W_down at 28,672 by 8,192 — 704.6 million parameters, 82 percent of the layer, three matrices and no biases. A caption under the stack reads: each sub-block is a detour — branch off the stream, transform, add back at the plus node; one residual stream threads all 80 identical layers. Below, a whole-model bar splits Llama 2 70B's 68.98 billion parameters into a long green MLP segment of 56.4 billion, 81.7 percent, and a short neutral segment of 12.6 billion for everything else. Takeaway: 82 percent of the layer, times 80 layers — four-fifths of the bytes are MLP bytes.">
  <style>
    .bg    { fill:#faf8f3; stroke:#e4e1da; }
    .ey    { font:600 12px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:1.5px; fill:#2f7d3b; }
    .card  { fill:#faf8f3; stroke:#1c1b17; stroke-width:1.2; }
    .ghost { fill:#faf8f3; stroke:#ddd8cf; stroke-width:1; }
    .glab  { font:400 10px 'JetBrains Mono',ui-monospace,monospace; fill:#79736a; }
    .clab  { font:600 12px 'JetBrains Mono',ui-monospace,monospace; fill:#1c1b17; }
    .pnl   { fill:#faf8f3; stroke:#e4e1da; }
    .ttl   { font:600 13px 'JetBrains Mono',ui-monospace,monospace; fill:#1c1b17; }
    .tag   { font:400 9px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:1px; fill:#79736a; }
    .wbox  { fill:#faf8f3; stroke:#1c1b17; }
    .wtx   { font:600 9px 'JetBrains Mono',ui-monospace,monospace; fill:#1c1b17; }
    .wdim  { font:400 8px 'JetBrains Mono',ui-monospace,monospace; fill:#6f6d68; }
    .mbox  { fill:#e4f0e1; stroke:#2f7d3b; }
    .mtx   { font:600 10px 'JetBrains Mono',ui-monospace,monospace; fill:#2f7d3b; }
    .mdim  { font:400 9px 'JetBrains Mono',ui-monospace,monospace; fill:#6f6d68; }
    .badgA { font:700 9px 'JetBrains Mono',ui-monospace,monospace; fill:#1c1b17; }
    .badgM { font:700 12px 'JetBrains Mono',ui-monospace,monospace; fill:#2f7d3b; }
    .stream{ stroke:#1c1b17; stroke-width:3; fill:none; }
    .stub  { stroke:#a9a49a; stroke-width:2; fill:none; }
    .hop   { stroke:#1c1b17; stroke-width:1.5; stroke-dasharray:4 3; fill:none; }
    .rlab  { font:700 11px 'JetBrains Mono',ui-monospace,monospace; fill:#1c1b17; }
    .brl   { font:400 8px 'JetBrains Mono',ui-monospace,monospace; fill:#79736a; }
    .riseA { stroke:#6f6d68; stroke-width:1.5; fill:none; }
    .riseM { stroke:#2f7d3b; stroke-width:2; fill:none; }
    .plusA { fill:#faf8f3; stroke:#6f6d68; stroke-width:1.5; }
    .plusM { fill:#faf8f3; stroke:#2f7d3b; stroke-width:1.5; }
    .ptxA  { font:700 11px 'JetBrains Mono',ui-monospace,monospace; fill:#6f6d68; }
    .ptxM  { font:700 11px 'JetBrains Mono',ui-monospace,monospace; fill:#2f7d3b; }
    .cap1  { font:400 10px 'JetBrains Mono',ui-monospace,monospace; fill:#79736a; }
    .cap2  { font:600 11px 'JetBrains Mono',ui-monospace,monospace; fill:#1c1b17; }
    .barhd { font:600 11px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:.5px; fill:#6f6d68; }
    .barM  { fill:#2f7d3b; }
    .barMt { font:700 11px 'JetBrains Mono',ui-monospace,monospace; fill:#faf8f3; }
    .barE  { fill:#faf8f3; stroke:#a9a49a; }
    .barEt { font:600 10px 'JetBrains Mono',ui-monospace,monospace; fill:#1c1b17; }
    .slab  { font:400 9px 'JetBrains Mono',ui-monospace,monospace; fill:#79736a; }
    .take  { font:700 12px 'JetBrains Mono',ui-monospace,monospace; fill:#2f7d3b; }
    .note  { font:400 10px 'JetBrains Mono',ui-monospace,monospace; fill:#79736a; }
  </style>
  <defs>
    <marker id="ih" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1c1b17"/></marker>
    <marker id="ia" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6f6d68"/></marker>
    <marker id="ig" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2f7d3b"/></marker>
  </defs>

  <rect class="bg" x="1" y="1" width="678" height="558" rx="2"/>
  <text class="ey" x="34" y="30">ONE LAYER, WEIGHED — LLAMA 2 70B</text>

  <!-- ============ THE STACK: 80 identical layer cards ============ -->
  <!-- back to front: layer 80, ..., layer 2, layer 1 (detailed) -->
  <rect class="ghost" x="92" y="64"  width="540" height="272" rx="4"/>
  <rect class="ghost" x="76" y="80"  width="540" height="272" rx="4"/>
  <rect class="ghost" x="60" y="96"  width="540" height="272" rx="4"/>
  <rect class="card"  x="44" y="112" width="540" height="272" rx="4"/>
  <text class="glab" x="624" y="77"  text-anchor="end">layer 80</text>
  <text class="glab" x="608" y="93"  text-anchor="end">⋯</text>
  <text class="glab" x="592" y="109" text-anchor="end">layer 2</text>
  <text class="clab" x="576" y="130" text-anchor="end">layer 1</text>

  <!-- ============ ATTENTION SUB-BLOCK (area ∝ 151M) ============ -->
  <rect class="pnl" x="58" y="210" width="132" height="96" rx="3"/>
  <text class="ttl" x="124" y="227" text-anchor="middle">Attention</text>
  <text class="tag" x="124" y="238" text-anchor="middle">GQA</text>
  <rect class="wbox" x="64"  y="244" width="58" height="20" rx="2"/>
  <text class="wtx"  x="93"  y="253" text-anchor="middle">Wq</text>
  <text class="wdim" x="93"  y="261" text-anchor="middle">8192×8192</text>
  <rect class="wbox" x="126" y="244" width="58" height="20" rx="2"/>
  <text class="wtx"  x="155" y="253" text-anchor="middle">Wk</text>
  <text class="wdim" x="155" y="261" text-anchor="middle">8192×1024</text>
  <rect class="wbox" x="64"  y="268" width="58" height="20" rx="2"/>
  <text class="wtx"  x="93"  y="277" text-anchor="middle">Wv</text>
  <text class="wdim" x="93"  y="285" text-anchor="middle">8192×1024</text>
  <rect class="wbox" x="126" y="268" width="58" height="20" rx="2"/>
  <text class="wtx"  x="155" y="277" text-anchor="middle">Wo</text>
  <text class="wdim" x="155" y="285" text-anchor="middle">8192×8192</text>
  <text class="badgA" x="124" y="300" text-anchor="middle">151.0M · 18% of layer</text>

  <!-- ============ MLP SUB-BLOCK (area ∝ 704.6M) ============ -->
  <rect class="pnl" x="204" y="140" width="340" height="166" rx="3"/>
  <text class="ttl" x="374" y="158" text-anchor="middle">MLP</text>
  <text class="tag" x="374" y="171" text-anchor="middle">SwiGLU</text>
  <rect class="mbox" x="212" y="180" width="100" height="72" rx="2"/>
  <text class="mtx"  x="262" y="212" text-anchor="middle">W_gate</text>
  <text class="mdim" x="262" y="230" text-anchor="middle">8,192 × 28,672</text>
  <rect class="mbox" x="324" y="180" width="100" height="72" rx="2"/>
  <text class="mtx"  x="374" y="212" text-anchor="middle">W_up</text>
  <text class="mdim" x="374" y="230" text-anchor="middle">8,192 × 28,672</text>
  <rect class="mbox" x="436" y="180" width="100" height="72" rx="2"/>
  <text class="mtx"  x="486" y="212" text-anchor="middle">W_down</text>
  <text class="mdim" x="486" y="230" text-anchor="middle">28,672 × 8,192</text>
  <text class="badgM" x="374" y="276" text-anchor="middle">704.6M — 82% of layer</text>
  <text class="tag"   x="374" y="292" text-anchor="middle">three matrices, no biases</text>

  <!-- ============ RESIDUAL STREAM: the spine ============ -->
  <path class="stream" d="M20,340 L588,340"/>
  <path d="M34,336 L41,340 L34,344 Z"  fill="#1c1b17"/>
  <path d="M193,336 L200,340 L193,344 Z" fill="#1c1b17"/>
  <path d="M558,336 L565,340 L558,344 Z" fill="#1c1b17"/>
  <text class="rlab" x="52" y="364">residual stream</text>

  <!-- attention detour: branch off, add back at ⊕ -->
  <circle cx="86" cy="340" r="3" fill="#6f6d68"/>
  <path class="riseA" d="M86,340 L86,312" marker-end="url(#ia)"/>
  <text class="brl" x="93" y="328">read</text>
  <path class="riseA" d="M158,308 L158,326" marker-end="url(#ia)"/>
  <text class="brl" x="170" y="318">add</text>
  <circle class="plusA" cx="158" cy="340" r="9"/>
  <text class="ptxA" x="158" y="344" text-anchor="middle">+</text>

  <!-- MLP detour: branch off, add back at ⊕ -->
  <circle cx="222" cy="340" r="3" fill="#2f7d3b"/>
  <path class="riseM" d="M222,340 L222,312" marker-end="url(#ig)"/>
  <text class="brl" x="229" y="328">read</text>
  <path class="riseM" d="M526,308 L526,326" marker-end="url(#ig)"/>
  <text class="brl" x="538" y="318">add</text>
  <circle class="plusM" cx="526" cy="340" r="9"/>
  <text class="ptxM" x="526" y="344" text-anchor="middle">+</text>

  <!-- the same stream threads the rest of the stack -->
  <line class="stub" x1="584" y1="324" x2="600" y2="324"/>
  <line class="stub" x1="600" y1="308" x2="616" y2="308"/>
  <line class="stub" x1="616" y1="292" x2="632" y2="292"/>
  <path class="hop" d="M588,340 L601,323 L617,307 L633,291" marker-end="url(#ih)"/>

  <!-- ============ STACK CAPTION ============ -->
  <text class="cap1" x="340" y="406" text-anchor="middle">each sub-block is a detour: branch off the stream, transform, add back at ⊕</text>
  <text class="cap2" x="340" y="424" text-anchor="middle">one residual stream threads all 80 identical layers</text>

  <!-- ============ WHOLE-MODEL BAR ============ -->
  <text class="barhd" x="34" y="448">WHOLE MODEL · LLAMA 2 70B · 68.98B PARAMS</text>
  <rect class="barM" x="34" y="456" width="500" height="28" rx="2"/>
  <text class="barMt" x="284" y="474" text-anchor="middle">MLP 56.4B (81.7%)</text>
  <rect class="barE" x="534" y="456" width="112" height="28" rx="2"/>
  <text class="barEt" x="590" y="474" text-anchor="middle">12.6B</text>
  <text class="slab" x="590" y="498" text-anchor="middle">everything else</text>

  <!-- ============ TAKEAWAY ============ -->
  <text class="take" x="340" y="526" text-anchor="middle">82% of the layer, × 80 layers — four-fifths of the bytes are MLP bytes</text>
  <text class="note" x="340" y="542" text-anchor="middle">attention's cost grows with the sequence; the MLP's is flat per token — but it dominates the constant</text>
</svg>
