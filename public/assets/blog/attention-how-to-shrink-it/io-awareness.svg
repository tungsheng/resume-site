<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" role="img"
     aria-label="Why FlashAttention wins: memory traffic, not arithmetic. Both panels show a GPU's two memory pools — fast on-chip SRAM at about 19 terabytes per second on top, big but slow HBM at about 2 terabytes per second below — with arrows for bytes crossing the bus between them. Left, standard attention: the N-by-N score matrix S equals Q K-transpose and its softmax P don't fit in SRAM, so they spill to HBM and come back — four separate bus crossings drawn as four arrows in order: write S, read S, write P, read P. In HBM the grid is drawn large, dwarfing the Q, K, and V chips. That is order N-squared bytes, and the round-trip, not the matmul, is the bottleneck. Right, FlashAttention: Q, K, and V are read once as tiles, the grid is computed tile by tile inside SRAM with a running online softmax, and only the small output O is written back — no grid traffic at all. A dashed empty square in HBM marks where the grid would have been: never written. Order N bytes over the bus, exact same output, just faster.">
  <style>
    .bg    { fill:#ffffff; stroke:#e6e6e6; }
    .ey    { font:600 12px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:1.5px; fill:#006b40; }
    .ptl   { font:600 13px 'JetBrains Mono',ui-monospace,monospace; fill:#14171a; }
    .mem   { fill:#fafbfb; stroke:#aab2ae; }
    .memlab{ font:600 11px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:.5px; fill:#5c6670; }
    .bw    { font:400 10px 'JetBrains Mono',ui-monospace,monospace; fill:#7a847f; }
    .op    { font:600 10px 'JetBrains Mono',ui-monospace,monospace; fill:#5c6670; }
    .chip  { fill:#ffffff; stroke:#14171a; }
    .chiptx{ font:600 11px 'JetBrains Mono',ui-monospace,monospace; fill:#14171a; }
    .grid  { fill:#f0eee9; stroke:#14171a; stroke-width:1.5; }
    .gridln{ stroke:#d8d3c8; stroke-width:1; }
    .gridtx{ font:600 11px 'JetBrains Mono',ui-monospace,monospace; fill:#14171a; }
    .ghost { fill:none; stroke:#aab2ae; stroke-width:1.5; stroke-dasharray:5 4; }
    .keep  { fill:#dff6ee; stroke:#006b40; }
    .keeptx{ font:600 10px 'JetBrains Mono',ui-monospace,monospace; fill:#006b40; }
    .rw    { stroke:#14171a; stroke-width:2; fill:none; }
    .thin  { stroke:#006b40; stroke-width:1.5; fill:none; }
    .trafA { font:700 12px 'JetBrains Mono',ui-monospace,monospace; fill:#14171a; }
    .trafB { font:700 12px 'JetBrains Mono',ui-monospace,monospace; fill:#006b40; }
    .note  { font:400 10px 'JetBrains Mono',ui-monospace,monospace; fill:#7a847f; }
  </style>
  <defs>
    <marker id="ih" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#14171a"/></marker>
    <marker id="ig" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#006b40"/></marker>
  </defs>

  <rect class="bg" x="1" y="1" width="678" height="378" rx="2"/>
  <text class="ey" x="34" y="30">IO-AWARENESS — IT'S THE MEMORY TRAFFIC, NOT THE MATH</text>

  <!-- ================= LEFT: standard attention ================= -->
  <text class="ptl" x="182" y="58" text-anchor="middle">Standard attention</text>

  <!-- SRAM -->
  <rect class="mem" x="64" y="72" width="236" height="68" rx="3"/>
  <text class="memlab" x="182" y="90" text-anchor="middle">SRAM · on-chip · ~19 TB/s</text>
  <text class="bw" x="182" y="110" text-anchor="middle">the N × N scores don't fit here</text>
  <text class="bw" x="182" y="124" text-anchor="middle">they spill to HBM and come back</text>

  <!-- the round-trip: four crossings, in order -->
  <path class="rw" d="M110,146 L110,184" marker-end="url(#ih)"/>
  <path class="rw" d="M158,184 L158,146" marker-end="url(#ih)"/>
  <path class="rw" d="M206,146 L206,184" marker-end="url(#ih)"/>
  <path class="rw" d="M254,184 L254,146" marker-end="url(#ih)"/>
  <text class="op" x="110" y="198" text-anchor="middle">write S</text>
  <text class="op" x="158" y="198" text-anchor="middle">read S</text>
  <text class="op" x="206" y="198" text-anchor="middle">write P</text>
  <text class="op" x="254" y="198" text-anchor="middle">read P</text>

  <!-- HBM -->
  <rect class="mem" x="64" y="204" width="236" height="118" rx="3"/>
  <text class="memlab" x="182" y="222" text-anchor="middle">HBM · off-chip · ~2 TB/s</text>
  <rect class="chip" x="80" y="234" width="40" height="20" rx="2"/><text class="chiptx" x="100" y="248" text-anchor="middle">Q</text>
  <rect class="chip" x="80" y="260" width="40" height="20" rx="2"/><text class="chiptx" x="100" y="274" text-anchor="middle">K</text>
  <rect class="chip" x="80" y="286" width="40" height="20" rx="2"/><text class="chiptx" x="100" y="300" text-anchor="middle">V</text>
  <rect class="grid" x="140" y="232" width="84" height="84" rx="2"/>
  <line class="gridln" x1="168" y1="232" x2="168" y2="316"/>
  <line class="gridln" x1="196" y1="232" x2="196" y2="316"/>
  <line class="gridln" x1="140" y1="260" x2="224" y2="260"/>
  <line class="gridln" x1="140" y1="288" x2="224" y2="288"/>
  <text class="gridtx" x="182" y="258" text-anchor="middle">S = QKᵀ</text>
  <text class="gridtx" x="182" y="274" text-anchor="middle">P = softmax</text>
  <text class="bw"     x="182" y="292" text-anchor="middle">N × N</text>
  <text class="bw" x="236" y="270">dwarfs</text>
  <text class="bw" x="236" y="284">Q, K, V</text>

  <text class="trafA" x="182" y="348" text-anchor="middle">O(N²) bytes over the bus</text>
  <text class="note"  x="182" y="364" text-anchor="middle">the round-trip is the bottleneck, not the matmul</text>

  <!-- divider -->
  <line x1="340" y1="48" x2="340" y2="330" stroke="#eef0f0" stroke-width="1"/>

  <!-- ================= RIGHT: FlashAttention ================= -->
  <text class="ptl" x="498" y="58" text-anchor="middle">FlashAttention</text>

  <!-- SRAM: the grid lives here -->
  <rect class="mem" x="380" y="72" width="236" height="68" rx="3"/>
  <text class="memlab" x="498" y="90" text-anchor="middle">SRAM · on-chip · ~19 TB/s</text>
  <rect class="keep" x="394" y="98" width="208" height="22" rx="2"/>
  <text class="keeptx" x="498" y="112" text-anchor="middle">Q·K tile → online softmax → O</text>
  <text class="bw" x="498" y="134" text-anchor="middle">the grid lives here, tile by tile</text>

  <!-- the bus: only inputs once and O ever cross -->
  <path class="thin" d="M440,184 L440,146" marker-end="url(#ig)"/>
  <text class="bw" x="448" y="162">Q, K, V:</text>
  <text class="bw" x="448" y="176">read once, tiled</text>
  <path class="thin" d="M556,146 L556,184" marker-end="url(#ig)"/>
  <text class="bw" x="564" y="162">O:</text>
  <text class="bw" x="564" y="176">written once</text>
  <text class="op" x="498" y="198" text-anchor="middle">no grid traffic</text>

  <!-- HBM: no grid, ever -->
  <rect class="mem" x="380" y="204" width="236" height="118" rx="3"/>
  <text class="memlab" x="498" y="222" text-anchor="middle">HBM · off-chip · ~2 TB/s</text>
  <rect class="chip" x="406" y="236" width="40" height="22" rx="2"/><text class="chiptx" x="426" y="251" text-anchor="middle">Q</text>
  <rect class="chip" x="454" y="236" width="40" height="22" rx="2"/><text class="chiptx" x="474" y="251" text-anchor="middle">K</text>
  <rect class="chip" x="502" y="236" width="40" height="22" rx="2"/><text class="chiptx" x="522" y="251" text-anchor="middle">V</text>
  <rect class="keep" x="550" y="236" width="40" height="22" rx="2"/><text class="keeptx" x="570" y="251" text-anchor="middle">O</text>
  <rect class="ghost" x="476" y="270" width="44" height="44" rx="2"/>
  <text class="bw" x="498" y="296" text-anchor="middle">N×N</text>
  <text class="bw" x="530" y="288">the grid is</text>
  <text class="bw" x="530" y="302">never written</text>

  <text class="trafB" x="498" y="348" text-anchor="middle">O(N) bytes over the bus</text>
  <text class="note"  x="498" y="364" text-anchor="middle">exact same output — just ~2–4× faster</text>

</svg>
