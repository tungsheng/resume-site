<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 424" role="img"
     aria-label="Two stacked grids comparing batching regimes, four batch slots by twelve decode iterations each, from Orca OSDI 2022. Top panel, request-level batching — the batch is one unit of work: requests R1 through R4 occupy the four slots. R1 generates from iteration t1 to t4, R2 through t7, R3 through t9, R4 runs all twelve iterations. After a request finishes, its slot sits idle — drawn as hatched grey cells — until the whole batch completes at t12: R1 idles for eight iterations, R2 for five, R3 for three. A queued request R5 sits outside the batch in a chip labeled R5 queued, annotated waits until t12. Bottom panel, iteration-level scheduling — the batch is re-formed every iteration: the same four slots, but the moment a request finishes, its slot is refilled on the next iteration. R5 takes over R1's slot at t5 and generates t5 to t12, R6 takes R2's slot at t8, R7 takes R3's slot at t10; R4 runs t1 to t12 as before. An arrow at the R1-to-R5 boundary is labeled finished, then slot refilled on the next iteration. There are no idle cells — the batch stays full. Footnote: Orca, OSDI 2022 — iteration-level scheduling: the scheduler runs one iteration, then re-forms the batch.">
  <title>Request-level vs iteration-level scheduling — Orca (OSDI '22)</title>
  <style>
    .bg    { fill:#ffffff; stroke:#e6e6e6; }
    .ey    { font:600 12px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:1.5px; fill:#006b40; }
    .stg   { font:600 11px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:1px; fill:#006b40; }
    .subin { font:400 10px 'JetBrains Mono',ui-monospace,monospace; fill:#5c6670; }
    .tick  { font:400 9.5px 'JetBrains Mono',ui-monospace,monospace; fill:#5c6670; }
    .row   { font:600 10.5px 'JetBrains Mono',ui-monospace,monospace; fill:#14171a; }
    .rown  { fill:#006b40; }
    .cg    { fill:#e8f3ee; stroke:#006b40; stroke-width:1.1; }
    .cn    { fill:#cfe6da; stroke:#006b40; stroke-width:1.4; }
    .ci    { fill:url(#hatch); stroke:#d5d9d6; stroke-width:1; }
    .clbl  { font:700 10px 'JetBrains Mono',ui-monospace,monospace; fill:#006b40; }
    .chip  { fill:#ffffff; stroke:#14171a; }
    .chiptx{ font:600 11px 'JetBrains Mono',ui-monospace,monospace; fill:#14171a; }
    .thin  { stroke:#aab2ae; stroke-width:1.2; fill:none; }
    .arrg  { stroke:#006b40; stroke-width:1.2; fill:none; }
    .hair  { stroke:#e0e3e1; stroke-width:1; }
    .vs    { font:600 10px 'JetBrains Mono',ui-monospace,monospace; fill:#5c6670; }
    .anng  { font:400 10px 'JetBrains Mono',ui-monospace,monospace; fill:#006b40; }
    .ann2  { font:400 9.5px 'JetBrains Mono',ui-monospace,monospace; fill:#5c6670; }
    .note  { font:400 9.5px 'JetBrains Mono',ui-monospace,monospace; fill:#7a847f; }
  </style>
