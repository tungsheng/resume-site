    <marker id="agr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#aab2ae"/></marker>
    <pattern id="hatch" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="5" height="5" fill="#fbfbfa"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#dde2df" stroke-width="1.2"/>
    </pattern>
  </defs>

