<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 472" role="img"
     aria-label="The attention weight grid for the sentence The cat sat because it was tired. The grid is the softmax part of the formula above. Rows are the querying token, columns are the token being looked at. Each cell is a query-key score that has been scaled and masked, then normalized by softmax so that every row sums to one. Cells are shaded by attention weight: darker means more weight. The upper triangle, where a token would look ahead to a later token, is masked to negative infinity and receives zero weight. In the row for it, most of the weight lands on the column for cat, showing attention resolving the pronoun to its referent.">
  <style>
    .bg     { fill:#faf8f3; stroke:#e4e1da; }
    .ey     { font:600 12px 'JetBrains Mono',ui-monospace,monospace; letter-spacing:1.5px; fill:#2f7d3b; }
    .formula{ font:600 14px 'JetBrains Mono',ui-monospace,monospace; fill:#1c1b17; }
    .fop    { fill:#2f7d3b; }
    .anno   { font:600 12px 'JetBrains Mono',ui-monospace,monospace; fill:#2f7d3b; }
    .hm     { stroke:#d5e0cf; }
    .mask   { fill:#faf8f3; stroke:#f0ebe2; }
    .w      { font:600 10px 'JetBrains Mono',ui-monospace,monospace; text-anchor:middle; }
    .hdr    { font:600 12px 'JetBrains Mono',ui-monospace,monospace; fill:#79736a; }
    .hot-lbl{ font:700 12px 'JetBrains Mono',ui-monospace,monospace; fill:#2f7d3b; }
    .lbl    { font:400 12px 'JetBrains Mono',ui-monospace,monospace; fill:#6f6d68; }
    .note   { font:600 12px 'JetBrains Mono',ui-monospace,monospace; fill:#2f7d3b; }
    .cap    { font:400 12px 'JetBrains Mono',ui-monospace,monospace; fill:#6f6d68; }
    .arr    { stroke:#2f7d3b; stroke-width:1.5; fill:none; }
  </style>
  <defs>
    <marker id="sa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2f7d3b"/></marker>
    <linearGradient id="wscale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f7d3b" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2f7d3b" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <rect class="bg" x="1" y="1" width="678" height="470" rx="2"/>
  <text class="ey" x="34" y="32">SCALED DOT-PRODUCT ATTENTION</text>

  <!-- formula; the underbrace marks the softmax(...) part as the grid below -->
  <text class="formula" x="340" y="64" text-anchor="middle">output = <tspan class="fop">softmax</tspan>( Q·Kᵀ / √d_head + mask ) · V</text>
  <path class="arr" d="M227,72 L227,76 L495,76 L495,72" fill="none"/>
  <text class="anno" x="502" y="82">= the grid below</text>

  <!-- GRID: 7x7, origin gx=232 gy=120, cell=42. Tokens: The cat sat because it was tired -->
  <!-- Cells shaded by post-softmax attention weight; each allowed row sums to 1.00. Upper triangle masked. -->
  <!-- row 0: The -->
  <rect class="hm" x="232" y="120" width="42" height="42" fill="#2f7d3b" fill-opacity="0.92"/><text class="w" x="253" y="145" fill="#faf8f3">1.00</text>
  <rect class="mask" x="274" y="120" width="42" height="42"/><rect class="mask" x="316" y="120" width="42" height="42"/><rect class="mask" x="358" y="120" width="42" height="42"/><rect class="mask" x="400" y="120" width="42" height="42"/><rect class="mask" x="442" y="120" width="42" height="42"/><rect class="mask" x="484" y="120" width="42" height="42"/>
  <!-- row 1: cat -->
  <rect class="hm" x="232" y="162" width="42" height="42" fill="#2f7d3b" fill-opacity="0.39"/><text class="w" x="253" y="187" fill="#2b3a33">0.35</text>
  <rect class="hm" x="274" y="162" width="42" height="42" fill="#2f7d3b" fill-opacity="0.63"/><text class="w" x="295" y="187" fill="#faf8f3">0.65</text>
  <rect class="mask" x="316" y="162" width="42" height="42"/><rect class="mask" x="358" y="162" width="42" height="42"/><rect class="mask" x="400" y="162" width="42" height="42"/><rect class="mask" x="442" y="162" width="42" height="42"/><rect class="mask" x="484" y="162" width="42" height="42"/>
  <!-- row 2: sat -->
  <rect class="hm" x="232" y="204" width="42" height="42" fill="#2f7d3b" fill-opacity="0.22"/><text class="w" x="253" y="229" fill="#2b3a33">0.15</text>
  <rect class="hm" x="274" y="204" width="42" height="42" fill="#2f7d3b" fill-opacity="0.55"/><text class="w" x="295" y="229" fill="#faf8f3">0.55</text>
  <rect class="hm" x="316" y="204" width="42" height="42" fill="#2f7d3b" fill-opacity="0.35"/><text class="w" x="337" y="229" fill="#2b3a33">0.30</text>
  <rect class="mask" x="358" y="204" width="42" height="42"/><rect class="mask" x="400" y="204" width="42" height="42"/><rect class="mask" x="442" y="204" width="42" height="42"/><rect class="mask" x="484" y="204" width="42" height="42"/>
  <!-- row 3: because -->
  <rect class="hm" x="232" y="246" width="42" height="42" fill="#2f7d3b" fill-opacity="0.18"/><text class="w" x="253" y="271" fill="#2b3a33">0.10</text>
  <rect class="hm" x="274" y="246" width="42" height="42" fill="#2f7d3b" fill-opacity="0.26"/><text class="w" x="295" y="271" fill="#2b3a33">0.20</text>
  <rect class="hm" x="316" y="246" width="42" height="42" fill="#2f7d3b" fill-opacity="0.47"/><text class="w" x="337" y="271" fill="#faf8f3">0.45</text>
  <rect class="hm" x="358" y="246" width="42" height="42" fill="#2f7d3b" fill-opacity="0.31"/><text class="w" x="379" y="271" fill="#2b3a33">0.25</text>
  <rect class="mask" x="400" y="246" width="42" height="42"/><rect class="mask" x="442" y="246" width="42" height="42"/><rect class="mask" x="484" y="246" width="42" height="42"/>
  <!-- row 4: it  (hero row — most weight on cat) -->
  <rect class="hm" x="232" y="288" width="42" height="42" fill="#2f7d3b" fill-opacity="0.16"/><text class="w" x="253" y="313" fill="#2b3a33">0.07</text>
  <rect class="hm" x="274" y="288" width="42" height="42" fill="#2f7d3b" fill-opacity="0.61"/><text class="w" x="295" y="313" fill="#faf8f3">0.62</text>
  <rect class="hm" x="316" y="288" width="42" height="42" fill="#2f7d3b" fill-opacity="0.17"/><text class="w" x="337" y="313" fill="#2b3a33">0.08</text>
  <rect class="hm" x="358" y="288" width="42" height="42" fill="#2f7d3b" fill-opacity="0.14"/><text class="w" x="379" y="313" fill="#2b3a33">0.05</text>
  <rect class="hm" x="400" y="288" width="42" height="42" fill="#2f7d3b" fill-opacity="0.25"/><text class="w" x="421" y="313" fill="#2b3a33">0.18</text>
  <rect class="mask" x="442" y="288" width="42" height="42"/><rect class="mask" x="484" y="288" width="42" height="42"/>
  <!-- row 5: was -->
  <rect class="hm" x="232" y="330" width="42" height="42" fill="#2f7d3b" fill-opacity="0.14"/><text class="w" x="253" y="355" fill="#2b3a33">0.05</text>
  <rect class="hm" x="274" y="330" width="42" height="42" fill="#2f7d3b" fill-opacity="0.26"/><text class="w" x="295" y="355" fill="#2b3a33">0.20</text>
  <rect class="hm" x="316" y="330" width="42" height="42" fill="#2f7d3b" fill-opacity="0.14"/><text class="w" x="337" y="355" fill="#2b3a33">0.05</text>
  <rect class="hm" x="358" y="330" width="42" height="42" fill="#2f7d3b" fill-opacity="0.14"/><text class="w" x="379" y="355" fill="#2b3a33">0.05</text>
  <rect class="hm" x="400" y="330" width="42" height="42" fill="#2f7d3b" fill-opacity="0.43"/><text class="w" x="421" y="355" fill="#faf8f3">0.40</text>
  <rect class="hm" x="442" y="330" width="42" height="42" fill="#2f7d3b" fill-opacity="0.31"/><text class="w" x="463" y="355" fill="#2b3a33">0.25</text>
  <rect class="mask" x="484" y="330" width="42" height="42"/>
  <!-- row 6: tired -->
  <rect class="hm" x="232" y="372" width="42" height="42" fill="#2f7d3b" fill-opacity="0.14"/><text class="w" x="253" y="397" fill="#2b3a33">0.05</text>
  <rect class="hm" x="274" y="372" width="42" height="42" fill="#2f7d3b" fill-opacity="0.35"/><text class="w" x="295" y="397" fill="#2b3a33">0.30</text>
  <rect class="hm" x="316" y="372" width="42" height="42" fill="#2f7d3b" fill-opacity="0.14"/><text class="w" x="337" y="397" fill="#2b3a33">0.05</text>
  <rect class="hm" x="358" y="372" width="42" height="42" fill="#2f7d3b" fill-opacity="0.14"/><text class="w" x="379" y="397" fill="#2b3a33">0.05</text>
  <rect class="hm" x="400" y="372" width="42" height="42" fill="#2f7d3b" fill-opacity="0.31"/><text class="w" x="421" y="397" fill="#2b3a33">0.25</text>
  <rect class="hm" x="442" y="372" width="42" height="42" fill="#2f7d3b" fill-opacity="0.18"/><text class="w" x="463" y="397" fill="#2b3a33">0.10</text>
  <rect class="hm" x="484" y="372" width="42" height="42" fill="#2f7d3b" fill-opacity="0.26"/><text class="w" x="505" y="397" fill="#2b3a33">0.20</text>

  <!-- hero-cell highlight: row "it", column "cat" -->
  <rect x="274" y="288" width="42" height="42" fill="none" stroke="#1c1b17" stroke-width="2.5"/>

  <!-- column axis cue + headers (key tokens, rotated) -->
  <text class="lbl" x="138" y="108" text-anchor="start">keys →</text>
  <text class="hdr"     x="253" y="112" text-anchor="start" transform="rotate(-40 253 112)">The</text>
  <text class="hot-lbl" x="295" y="112" text-anchor="start" transform="rotate(-40 295 112)">cat</text>
  <text class="hdr"     x="337" y="112" text-anchor="start" transform="rotate(-40 337 112)">sat</text>
  <text class="hdr"     x="379" y="112" text-anchor="start" transform="rotate(-40 379 112)">because</text>
  <text class="hdr"     x="421" y="112" text-anchor="start" transform="rotate(-40 421 112)">it</text>
  <text class="hdr"     x="463" y="112" text-anchor="start" transform="rotate(-40 463 112)">was</text>
  <text class="hdr"     x="505" y="112" text-anchor="start" transform="rotate(-40 505 112)">tired</text>

  <!-- row headers (query tokens) -->
  <text class="lbl"     x="222" y="146" text-anchor="end">The</text>
  <text class="lbl"     x="222" y="188" text-anchor="end">cat</text>
  <text class="lbl"     x="222" y="230" text-anchor="end">sat</text>
  <text class="lbl"     x="222" y="272" text-anchor="end">because</text>
  <text class="hot-lbl" x="222" y="314" text-anchor="end">it</text>
  <text class="lbl"     x="222" y="356" text-anchor="end">was</text>
  <text class="lbl"     x="222" y="398" text-anchor="end">tired</text>

  <!-- query axis label -->
  <text class="lbl" x="150" y="266" text-anchor="middle" transform="rotate(-90 150 266)">queries — the token doing the looking  ↓</text>

  <!-- masked-region note -->
  <text class="lbl" x="540" y="150">masked:</text>
  <text class="lbl" x="540" y="166">a token can't</text>
  <text class="lbl" x="540" y="182">see the future</text>
  <text class="lbl" x="540" y="198">(−∞ added → 0)</text>

  <!-- highlight callout -->
  <path class="arr" d="M536,322 L318,330" marker-end="url(#sa)"/>
  <text class="note" x="540" y="300">"it" → "cat"</text>
  <text class="cap"  x="540" y="318">most of the 'it'</text>
  <text class="cap"  x="540" y="334">row's attention</text>
  <text class="cap"  x="540" y="350">weight is here</text>

  <!-- weight legend -->
  <text class="cap" x="540" y="384">attention weight</text>
  <rect x="540" y="392" width="100" height="10" fill="url(#wscale)" stroke="#d5e0cf"/>
  <text class="cap" x="540" y="416">0</text>
  <text class="cap" x="640" y="416" text-anchor="end">1</text>

  <!-- caption -->
  <text class="cap" x="34" y="442">Rows are queries, columns are keys; each cell is a query·key score, scaled and masked.</text>
  <text class="cap" x="34" y="460">Softmax makes each row sum to 1 (darker = more weight); the "it" row lands on "cat."</text>
</svg>
