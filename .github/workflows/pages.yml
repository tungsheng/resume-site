name: pages

# ADR-0003 §4: build the static site (incl. the build-time resume PDF via headless
# Chrome) and deploy dist/ to Cloudflare Pages. Cloudflare only serves bytes; it
# never needs Chromium. Supersedes the old GHCR image + VPS/SSH deploy (removed
# with the Bun app in a later slice).
#
# Required repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Adjust `projectName` below to the actual Cloudflare Pages project.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID live as secrets on the
    # "production" GitHub Environment, so the job must target it to read them.
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        # Pinned: ADR-0004 decision 5 — the Astro 7 + Sätteri build was verified
        # green under this Bun version, so the build runtime stays on Bun (no
        # Node step needed). Bump deliberately, re-verifying the build.
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Chrome (for the build-time resume PDF)
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Typecheck and unit tests
        run: bun run check

      - name: Build (astro build + resume PDF)
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: bun run build

      # Self-bootstrap the Pages project on first run (wrangler does not create
      # it automatically). Creates the correct Direct-Upload project type; the
      # `|| true` makes it a harmless no-op once the project exists.
      - name: Ensure the Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@3 pages project create resume-site --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=resume-site --commit-dirty=true
