name: pages

# ADR-0003 §4: build the static site (incl. the build-time resume PDF via headless
# Chrome) and deploy dist/ to Cloudflare Pages. Cloudflare only serves bytes; it
# never needs Chromium. Supersedes the old GHCR image + VPS/SSH deploy (removed
# with the Bun app in a later slice).
#
# Required repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Adjust `projectName` below to the actual Cloudflare Pages project.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Chrome (for the build-time resume PDF)
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Typecheck and unit tests
        run: bun run check

      - name: Build (astro build + resume PDF)
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=resume-site
