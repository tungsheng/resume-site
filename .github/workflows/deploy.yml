name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  DEPLOY_PATH: /srv/resume-site
  VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
  PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
  PRODUCTION_URL_REQUIRED: ${{ vars.PRODUCTION_URL_REQUIRED || 'false' }}
  REMOTE_DEBUG_LOGS: ${{ vars.REMOTE_DEBUG_LOGS || 'false' }}
  DEPLOY_SSH_OPTS: -o BatchMode=yes -o StrictHostKeyChecking=accept-new

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_AUDIENCE: ${{ secrets.TS_AUDIENCE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run repo checks
        run: bun run check

      - name: Derive image coordinates
        id: image
        run: |
          IMAGE_REPOSITORY="$(printf 'ghcr.io/%s\n' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "repository=${IMAGE_REPOSITORY}" >> "${GITHUB_OUTPUT}"
          echo "tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Validate Tailscale deploy configuration
        run: |
          if [[ -z "${VPS_HOST}" || -z "${VPS_USER}" ]]; then
            echo "VPS_HOST and VPS_USER are required for deploy." >&2
            exit 1
          fi
          if [[ -z "${TS_OAUTH_CLIENT_ID}" || -z "${TS_AUDIENCE}" ]]; then
            echo "TS_OAUTH_CLIENT_ID and TS_AUDIENCE are required for Tailscale deploy." >&2
            exit 1
          fi

      - name: Connect runner to Tailscale
        uses: tailscale/github-action@a392da0a182bba0e9613b6243ebd69529b1878aa # v4.1.0
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          audience: ${{ env.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ env.VPS_HOST }}

      - name: Verify deploy access
        run: |
          ssh ${DEPLOY_SSH_OPTS} -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" "true"

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.repository }}:latest

      - name: Upload deployment manifest
        run: |
          ssh ${DEPLOY_SSH_OPTS} -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp ${DEPLOY_SSH_OPTS} -P "${VPS_PORT}" docker-compose.prod.yml "${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/docker-compose.prod.yml"

      - name: Deploy on VPS
        env:
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          ssh ${DEPLOY_SSH_OPTS} -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" <<EOF
          set -euo pipefail
          mkdir -p "${DEPLOY_PATH}"
          cat > "${DEPLOY_PATH}/deploy.env" <<ENVVARS
          IMAGE_REPOSITORY=${IMAGE_REPOSITORY}
          IMAGE_TAG=${IMAGE_TAG}
          ENVVARS
          cd "${DEPLOY_PATH}"
          chmod 600 deploy.env
          if [ -n "${GHCR_USERNAME}" ] && [ -n "${GHCR_READ_TOKEN}" ]; then
            printf '%s\n' "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          fi
          docker compose --env-file deploy.env -f docker-compose.prod.yml pull
          docker compose --env-file deploy.env -f docker-compose.prod.yml up -d --remove-orphans
          for attempt in \$(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/resume >/dev/null; then
              break
            fi
            if [ "\${attempt}" -eq 30 ]; then
              echo "App failed readiness check after deploy"
              docker compose --env-file deploy.env -f docker-compose.prod.yml ps
              docker compose --env-file deploy.env -f docker-compose.prod.yml logs --tail=120
              exit 1
            fi
            sleep 2
          done
          pdf_headers="\$(mktemp)"
          pdf_file="\$(mktemp)"
          if ! curl -fsS -X POST -D "\${pdf_headers}" -o "\${pdf_file}" http://127.0.0.1:3000/api/public-pdf; then
            echo "PDF export smoke test failed after deploy"
            docker compose --env-file deploy.env -f docker-compose.prod.yml logs --tail=120
            rm -f "\${pdf_headers}" "\${pdf_file}"
            exit 1
          fi
          if ! grep -qi '^content-type: application/pdf' "\${pdf_headers}"; then
            echo "PDF export smoke test returned an unexpected content type"
            cat "\${pdf_headers}"
            rm -f "\${pdf_headers}" "\${pdf_file}"
            exit 1
          fi
          if [ ! -s "\${pdf_file}" ]; then
            echo "PDF export smoke test returned an empty PDF"
            rm -f "\${pdf_headers}" "\${pdf_file}"
            exit 1
          fi
          rm -f "\${pdf_headers}" "\${pdf_file}"
          docker compose --env-file deploy.env -f docker-compose.prod.yml ps
          docker image prune -f
          EOF

      - name: Smoke test public URL
        if: ${{ env.PRODUCTION_URL != '' }}
        run: |
          set +e
          curl --fail --silent --show-error --location --head \
            --connect-timeout 10 \
            --max-time 20 \
            --retry 5 \
            --retry-all-errors \
            --retry-connrefused \
            --retry-delay 5 \
            --retry-max-time 120 \
            "${PRODUCTION_URL}"
          curl_status=$?
          if [ "${curl_status}" -eq 0 ]; then
            exit 0
          fi

          message="Public URL smoke test failed for ${PRODUCTION_URL} with curl exit code ${curl_status}."
          if [ "${PRODUCTION_URL_REQUIRED}" = "true" ]; then
            echo "${message}" >&2
            exit "${curl_status}"
          fi

          echo "::warning::${message} The VPS deploy and internal smoke tests succeeded; set PRODUCTION_URL_REQUIRED=true to make this check block deploys."

      - name: Collect remote diagnostics on failure
        if: failure()
        run: |
          ssh ${DEPLOY_SSH_OPTS} -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" <<EOF
          set -euo pipefail
          cd "${DEPLOY_PATH}" || exit 0
          docker compose --env-file deploy.env -f docker-compose.prod.yml ps || true
          if [ "${REMOTE_DEBUG_LOGS}" = "true" ]; then
            docker compose --env-file deploy.env -f docker-compose.prod.yml logs --tail=120 || true
          fi
          EOF
